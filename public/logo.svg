<svg
  width="800"
  height="800"
  viewBox="0 0 1000 1000"
  xmlns="http://www.w3.org/2000/svg">
  <title id="logo-title">Plot Your Path Logo</title>
  <desc id="logo-desc">A bold, "engineered" geometric mark featuring a heavy exponential arc that sweeps from a deep red base to a vibrant light blue terminus, anchored by an oversized, high-contrast white node and a precision crosshair that signifies a clear "North Star" for career intelligence.</desc>
  <metadata>
   <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
            xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description rdf:about="">
         <dc:title>Plot Your Path Logo</dc:title>
         <dc:creator>Allen Rose</dc:creator>
         <dc:rights>Copyright © 2026 EverGray Tech. All rights reserved.</dc:rights>
         <dc:date>2026</dc:date>
         <dc:format>image/svg+xml</dc:format>
      </rdf:Description>
   </rdf:RDF>
  </metadata>

  <defs>
    <linearGradient
      id="pathLinearGradient"
      x1="180"
      y1="820"
      x2="830"
      y2="220"
      gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7D1D3F" />
      <stop offset="50%" stop-color="#1B365D" />
      <stop offset="100%" stop-color="#4A90E2" />
    </linearGradient>
  </defs>

  <path d="M 180 820 A 580 620 0 0 0 780 220" 
        fill="none" 
        stroke="url(#pathLinearGradient)" 
        stroke-width="180" 
        stroke-linecap="round" />

  <g transform="translate(780, 220)">
    <circle cx="0" cy="0" r="180" fill="#E8E8ED" />
    <circle cx="0" cy="0" r="150" fill="#4A90E2" />
    <rect x="-15" y="-90" width="30" height="180" fill="#E8E8ED" rx="4" />
    <rect x="-90" y="-15" width="180" height="30" fill="#E8E8ED" rx="4" />
  </g>
</svg>
